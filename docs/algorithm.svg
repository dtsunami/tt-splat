  <text x="1107" y="150" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">Image → Loss</text>
  <text x="1107" y="172" text-anchor="middle" font-size="11.5" fill="#33691e">L2 vs ground truth</text>
  <text x="1107" y="194" text-anchor="middle" font-size="11" fill="#2e7d32">elementwise ✓</text>

  <!-- forward arrows -->
  <line x1="196" y1="164" x2="234" y2="164" stroke="#37474f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="404" y1="164" x2="442" y2="164" stroke="#37474f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="612" y1="164" x2="650" y2="164" stroke="#37474f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="820" y1="164" x2="858" y2="164" stroke="#37474f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1028" y1="164" x2="1034" y2="164" stroke="#37474f" stroke-width="2.5" marker-end="url(#arrow)"/>

