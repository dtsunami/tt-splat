  <text x="944" y="148" text-anchor="middle" font-size="15" font-weight="bold" fill="#7a5b00">Rasterize</text>
  <text x="944" y="166" text-anchor="middle" font-size="11.5" fill="#7a5b00">front→back α-blend</text>
