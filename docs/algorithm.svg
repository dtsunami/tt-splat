  <text x="1118" y="290" font-size="11" fill="#607d8b">∂L/∂image</text>

  <!-- ================= BACKWARD ROW ================= -->
  <text x="28" y="352" font-size="15" font-weight="bold" fill="#37474f">BACKWARD  (gradients)</text>

  <!-- dL/dImage -->
  <rect x="1036" y="368" width="142" height="92" rx="10" fill="#c8e6c9" stroke="#2e7d32" stroke-width="3"/>
  <text x="1107" y="400" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">∂L/∂image</text>
  <text x="1107" y="422" text-anchor="middle" font-size="11.5" fill="#33691e">+ ∂blend per pixel</text>
  <text x="1107" y="444" text-anchor="middle" font-size="11" fill="#2e7d32">elementwise ✓</text>

  <!-- Backward raster: SCATTER-ADD (the killer) -->
  <rect x="800" y="356" width="228" height="116" rx="10" fill="#c8e6c9" stroke="#2e7d32" stroke-width="4"/>
  <text x="914" y="384" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">Backward rasterize ✓</text>
  <text x="914" y="403" text-anchor="middle" font-size="11.5" fill="#33691e">blend backward: autograd-verified (3.7e-16)</text>
  <text x="914" y="419" text-anchor="middle" font-size="11.5" fill="#33691e">device grads == math (2e-7)</text>
  <text x="914" y="435" text-anchor="middle" font-size="11.5" fill="#33691e">scatter-add: inbox→drain, no atomics/wedge</text>
  <text x="914" y="451" text-anchor="middle" font-size="11.5" fill="#33691e">int32 reduce 3.1–8 cyc/elem</text>
  <text x="914" y="467" text-anchor="middle" font-size="11" fill="#7a5b00">todo: scatter-add wired in-loop (now host-reduced)</text>

  <!-- Backward project -->
  <rect x="444" y="368" width="168" height="92" rx="10" fill="#c8e6c9" stroke="#2e7d32" stroke-width="3"/>
  <text x="528" y="400" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">Backward project ✓</text>
  <text x="528" y="422" text-anchor="middle" font-size="11.5" fill="#33691e">∂ conic/center (2D)</text>
  <text x="528" y="444" text-anchor="middle" font-size="11" fill="#33691e">autograd-verified</text>

  <!-- Param grads -->
  <rect x="236" y="368" width="168" height="92" rx="10" fill="#c8e6c9" stroke="#2e7d32" stroke-width="3"/>
  <text x="320" y="400" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">Param grads</text>
  <text x="320" y="422" text-anchor="middle" font-size="11.5" fill="#33691e">∂L/∂{μ,Σ,α,SH}</text>
  <text x="320" y="444" text-anchor="middle" font-size="11" fill="#2e7d32">analytic ✓ (2D, M1)</text>

  <!-- Adam -->
  <rect x="28" y="368" width="168" height="92" rx="10" fill="#c8e6c9" stroke="#2e7d32" stroke-width="3"/>
