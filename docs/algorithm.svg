  </defs>

  <rect x="0" y="0" width="1200" height="860" fill="#fafafa"/>
  <text x="600" y="38" text-anchor="middle" font-size="26" font-weight="bold" fill="#263238">3D Gaussian Splatting — Training on Blackhole</text>
  <text x="600" y="62" text-anchor="middle" font-size="15" fill="#607d8b">FULL LOOP CLOSED · 2D train 53.6 dB · 3D novel-view 46.7 dB · 2026-06-23</text>

  <!-- ================= FORWARD ROW ================= -->
  <text x="28" y="104" font-size="15" font-weight="bold" fill="#37474f">FORWARD  (render)</text>

  <!-- 1 Gaussians -->
  <rect x="28"  y="118" width="168" height="92" rx="10" fill="#c8e6c9" stroke="#2e7d32" stroke-width="3"/>
  <text x="112" y="150" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">Gaussian params</text>
  <text x="112" y="170" text-anchor="middle" font-size="11.5" fill="#33691e">μ₃ · Σ(scale,quat)</text>
  <text x="112" y="186" text-anchor="middle" font-size="11.5" fill="#33691e">opacity α · SH color</text>
  <text x="112" y="202" text-anchor="middle" font-size="11" fill="#2e7d32">tensors ✓</text>

  <!-- 2 Project -->
  <rect x="236" y="118" width="168" height="92" rx="10" fill="#c8e6c9" stroke="#2e7d32" stroke-width="3"/>
  <text x="320" y="150" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">Project 3D→2D ✓</text>
  <text x="320" y="170" text-anchor="middle" font-size="11.5" fill="#33691e">EWA: mean + Σ Jacobian</text>
  <text x="320" y="186" text-anchor="middle" font-size="11" fill="#33691e">M8 verified (autograd)</text>
  <text x="320" y="202" text-anchor="middle" font-size="11" fill="#7a5b00">matrix-engine later (⅛)</text>

  <!-- 3 Tile bin -->
  <rect x="444" y="118" width="168" height="92" rx="10" fill="#fff3c4" stroke="#f9a825" stroke-width="3"/>
  <text x="528" y="150" text-anchor="middle" font-size="15" font-weight="bold" fill="#7a5b00">Tile binning ✓</text>
  <text x="528" y="172" text-anchor="middle" font-size="11.5" fill="#7a5b00">3σ AABB → tiles</text>
  <text x="528" y="192" text-anchor="middle" font-size="11" fill="#33691e">M6 host (parallel →</text>
  <text x="528" y="206" text-anchor="middle" font-size="11" fill="#33691e">Tensix/x280 later)</text>

  <!-- 4 Sort -->
  <rect x="652" y="118" width="168" height="92" rx="10" fill="#fff3c4" stroke="#f9a825" stroke-width="3"/>
  <text x="736" y="150" text-anchor="middle" font-size="15" font-weight="bold" fill="#7a5b00">Depth sort ✓</text>
  <text x="736" y="172" text-anchor="middle" font-size="11.5" fill="#7a5b00">by (tile_id, depth)</text>
  <text x="736" y="192" text-anchor="middle" font-size="11" fill="#33691e">M6 host 6M-inst/s</text>
  <text x="736" y="206" text-anchor="middle" font-size="11" fill="#33691e">(GPU radix / x280 next)</text>

